name: Monthly Knowledge Base Update Scheduler

on:
  workflow_dispatch: # Allow manual triggering

jobs:
  update-kb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract text from latest PDFs
        run: python extract_pdf_text.py

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pdf_extracts/
          # If extracted_facts.json or vectors get updated automatically in the future, add them as well.
          git commit -m "chore: Monthly automated knowledge base document update"
          git push
